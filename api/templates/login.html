{% extends "layout.html" %}
{% block content %}
<div class="card">
    <h1>Access Wallet</h1>
    <p>Enter your 24-word backup phrase to unlock your wallet.</p>
    
    <form method="POST">
        <textarea name="seed_phrase" placeholder="Enter all 24 words separated by spaces..." required></textarea>
        <button type="submit" class="btn btn-primary">Unlock Wallet</button>
    </form>
    
    <a href="{{ url_for('home') }}" style="color: var(--text-dim); text-decoration: none; font-size: 0.9rem;">Back to Home</a>
</div>
{% endblock %}
