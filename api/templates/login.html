{% extends "layout.html" %}

{% block content %}
<div class="card">
    <h1>Login with Seed Phrase</h1>
    <p style="color: var(--text-muted); text-align: center; font-size: 0.9em; margin-bottom: 20px;">
        Enter your 24-word seed phrase to access your wallet.
    </p>
    <form method="POST">
        <div class="form-group">
            <label>24-Word Seed Phrase</label>
            <textarea name="seed_phrase" required style="width: 100%; height: 100px; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; resize: none;"></textarea>
        </div>
        <button type="submit">Login</button>
    </form>
    <div style="text-align: center; margin-top: 20px;">
        <a href="{{ url_for('register') }}" style="color: var(--text-muted); text-decoration: none;">New here? Create a wallet</a>
    </div>
</div>
{% endblock %}
