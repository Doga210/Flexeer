{% extends "layout.html" %}

{% block content %}
<div class="card">
    <h1>Reset Password</h1>
    <p style="color: var(--text-muted); text-align: center; font-size: 0.9em;">Enter your username and your new password.</p>
    <form method="POST">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" required>
        </div>
        <div class="form-group">
            <label>New Password</label>
            <input type="password" name="new_password" required>
        </div>
        <button type="submit">Reset Password</button>
    </form>
    <div style="text-align: center; margin-top: 20px;">
        <a href="{{ url_for('login') }}" style="color: var(--text-muted); text-decoration: none;">Back to Login</a>
    </div>
</div>
{% endblock %}
