<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexeer | Next-Gen Crypto Wallet</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0b0f1a;
            --card: #161b2c;
            --text: #ffffff;
            --text-dim: #94a3b8;
            --success: #10b981;
            --error: #ef4444;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
        }
        .card {
            background: var(--card);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }
        h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 10px; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: var(--text-dim); line-height: 1.6; margin-bottom: 30px; }
        
        .btn {
            display: inline-block;
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            font-size: 1rem;
            margin-bottom: 15px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }
        .btn-outline:hover { background: rgba(99, 102, 241, 0.1); }
        
        .flash {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        .flash-success { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid var(--success); }
        .flash-error { background: rgba(239, 68, 68, 0.1); color: var(--error); border: 1px solid var(--error); }

        .seed-grid {
            background: #0b0f1a;
            border-radius: 16px;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 25px;
            text-align: left;
            font-family: monospace;
            border: 1px dashed var(--primary);
        }
        .seed-word { font-size: 0.85rem; color: var(--text-dim); }
        .seed-word span { color: var(--text); font-weight: bold; }

        textarea {
            width: 100%;
            height: 120px;
            background: #0b0f1a;
            border: 1px solid #334155;
            border-radius: 12px;
            color: white;
            padding: 15px;
            font-family: inherit;
            resize: none;
            margin-bottom: 20px;
            outline: none;
        }
        textarea:focus { border-color: var(--primary); }

        .balance-box {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 25px;
        }
        .balance-label { font-size: 0.9rem; opacity: 0.8; margin-bottom: 5px; }
        .balance-value { font-size: 2.2rem; font-weight: 800; }

        .tx-list { list-style: none; padding: 0; margin: 0; text-align: left; }
        .tx-item {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .tx-info { display: flex; flex-direction: column; }
        .tx-type { font-weight: 600; font-size: 0.95rem; }
        .tx-date { font-size: 0.75rem; color: var(--text-dim); }
        .tx-amount { font-weight: bold; }
        .tx-plus { color: var(--success); }
        .tx-minus { color: var(--error); }
    </style>
</head>
<body>
    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="flash flash-{{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        
        {% block content %}{% endblock %}
    </div>
</body>
</html>
